name: 'Cleanup K3S Installation'
description: 'Checks and cleans up any existing K3S installation'

runs:
  using: "composite"
  steps:
    - name: Check and cleanup K3S installation
      shell: bash
      run: |
        echo "=== Checking for previous K3S installation ==="
        
        # Check if K3S is installed or running
        K3S_INSTALLED=false
        
        if [ -f /usr/local/bin/k3s ] || [ -f /usr/local/bin/k3s-uninstall.sh ] || pgrep -f k3s >/dev/null 2>&1; then
          K3S_INSTALLED=true
          echo "Found existing K3S installation, cleaning up..."
        elif [ -d /sys/fs/cgroup/kubepods.slice ]; then
          K3S_INSTALLED=true
          echo "Found orphaned kubepods cgroup (leftover from prior K3S run), cleaning up..."
        else
          echo "No existing K3S installation found, skipping cleanup"
        fi
        
        if [ "$K3S_INSTALLED" = true ]; then
          echo "=== Cleaning up previous K3S installation ==="
          
          # Stop K3S services if they exist
          if systemctl is-active --quiet k3s 2>/dev/null; then
            echo "Stopping K3S service..."
            sudo systemctl stop k3s || true
          fi
          
          if systemctl is-active --quiet k3s-agent 2>/dev/null; then
            echo "Stopping K3S agent service..."
            sudo systemctl stop k3s-agent || true
          fi
          
          # Kill any running K3S processes
          if pgrep -f k3s >/dev/null 2>&1; then
            echo "Killing K3S processes..."
            sudo pkill -f k3s || true
            sleep 2
          fi
          
          # Uninstall K3S if uninstaller exists
          if [ -f /usr/local/bin/k3s-uninstall.sh ]; then
            echo "Running K3S uninstaller..."
            sudo /usr/local/bin/k3s-uninstall.sh || true
          fi
          
          # Clean up remaining files only if they exist
          echo "Cleaning up remaining K3S files..."
          sudo rm -rf /etc/rancher /var/lib/rancher /var/lib/kubelet /var/lib/cni /run/k3s 2>/dev/null || true
          sudo rm -f /etc/systemd/system/k3s* /usr/local/bin/k3s* 2>/dev/null || true
          
          # Kill orphaned K3S pod processes that survived containerd-shim death
          # (reparented to PID 1 but still in kubepods cgroup)
          if [ -d /sys/fs/cgroup/kubepods.slice ]; then
            echo "Killing orphaned kubepods processes..."
            sudo find /sys/fs/cgroup/kubepods.slice -name "cgroup.procs" -exec cat {} \; 2>/dev/null \
              | sort -u | xargs -r sudo kill -9 2>/dev/null || true
            sleep 2
            sudo find /sys/fs/cgroup/kubepods.slice -maxdepth 0 -exec rmdir {} \; 2>/dev/null || true
          fi

          # Clean up containers/images only if Docker is running
          if command -v docker >/dev/null 2>&1 && docker info >/dev/null 2>&1; then
            echo "Cleaning up Docker containers and images..."
            docker system prune -af || true
          fi

          echo "=== Cleanup completed ==="
        fi
        
        exit 0
