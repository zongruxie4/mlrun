version: "2"

# timeout for analysis
timeout: 5m

run:
  build-tags:
    - test_unit
    - test_integration
linters:
    default: none
    enable:
      - errcheck
      - goconst
      - gocritic
      - govet
      - ineffassign
      - misspell
      - revive
      - staticcheck
      - unconvert
      - unused
    settings:
      gocritic:
        disabled-checks:
          - commentFormatting
      revive:
        rules:
          - name: errorf
            disabled: true
    exclusions:
      generated: lax
      presets:
        - comments
        - common-false-positives
        - legacy
        - std-error-handling
      rules:

        - linters:
            - goconst
          path: _test\.go
formatters:
  enable:
    - gci
    - gofmt
  settings:
    gci:
      sections:
        - standard
        - prefix(github.com/mlrun/framework)
        - prefix(github.com/mlrun/proto)
        - prefix(github.com/mlrun/services)
        - default
        - blank
        - dot
      custom-order: true
