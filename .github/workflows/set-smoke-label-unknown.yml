name: Set Smoke Tests Unknown Label

on:
  workflow_run:
    workflows: ["CI"]
    types: [requested]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  set-unknown:
    name: Set Smoke tests Unknown label
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_OWNER="${{ github.event.workflow_run.head_repository.owner.login }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR=$(curl -sS \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?head=${HEAD_OWNER}:${HEAD_BRANCH}" \
            | jq -r '.[0].number // empty')
          if [ -z "$PR" ]; then
            echo "::warning::No open PR found for ${HEAD_OWNER}:${HEAD_BRANCH}, skipping"
            exit 0
          fi
          echo "pr_number=${PR}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        if: steps.pr.outputs.pr_number != ''
        with:
          sparse-checkout: automation/scripts

      - name: Set Smoke tests Unknown label
        if: steps.pr.outputs.pr_number != ''
        uses: actions/github-script@v9
        with:
          script: |
            const addRemoveLabels = require('./automation/scripts/add-remove-labels.js')
            await addRemoveLabels({
              github, context,
              prNumber: ${{ steps.pr.outputs.pr_number }},
              labelsToAdd: [{ name: 'Smoke tests: Unknown', color: 'c5def5' }],
              labelsToRemove: ['Smoke tests: Pass', 'Smoke tests: Fail']
            })
