name: Docs Build

permissions:
  contents: read

on:
  pull_request:
    branches:
      - development
      - '[0-9]+.[0-9]+.x'
      - 'feature/**'
    paths:
      - "docs/**"
      - ".readthedocs.yml"
      - ".github/workflows/docs-build.yaml"

concurrency:
  group:
    ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  docs:
    name: Build Project Documentation (all formats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Extract git branch
        id: git_info
        run: |
          echo "branch=$(echo ${GITHUB_BASE_REF#refs/heads/})" >> $GITHUB_OUTPUT
      - name: Resolve docker cache tag
        id: docker_cache
        run: |
          export version_suffix=$(echo "${{ steps.git_info.outputs.branch }}" | grep -E "^[0-9]+\.[0-9]+\.x$" | tr -d '.')
          export unstable_tag=$(if [ -z "$version_suffix" ]; then echo "unstable-cache"; else echo "unstable-cache-$version_suffix";fi)
          echo "tag=$(echo $unstable_tag)" >> $GITHUB_OUTPUT
      - name: Build docs (all formats)
        run: MLRUN_DOCKER_REGISTRY=ghcr.io/ MLRUN_DOCKER_CACHE_FROM_TAG=${{ steps.docker_cache.outputs.tag }} make build-docs-dockerized
      - name: Upload generated docs
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: docs/_build
