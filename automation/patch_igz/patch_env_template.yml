# The deploy scripts expect the yaml file to be in the same directory
# this is a template file for the deploy env file


# Execution mode (optional). Inferred from KUBECONFIG when unset:
# kubectl mode if KUBECONFIG is set, otherwise ssh.
# - ssh:     SSH into a data node and run kubectl there.
# - kubectl: Run kubectl locally against the cluster.
MODE:

# Path to a kubeconfig file. Setting this implies MODE=kubectl unless MODE is
# set explicitly. Leave unset for ssh mode or to use the kubectl default
# (KUBECONFIG env var or ~/.kube/config) with an explicit MODE: kubectl.
KUBECONFIG:

# Data node IPs/hostnames (e.g. [1.1.1.1, 1.1.1.2, 1.1.1.3]).
# Required for MODE=ssh. In kubectl mode, only set when pushing to per-node
# Iguazio datanode registries (multi-node image replication).
DATA_NODES:

# Username for ssh (required when MODE=ssh)
SSH_USER:

# Password for above user (required when MODE=ssh)
SSH_PASSWORD:

# Docker registry you can push to. Make sure you are logged into it before running the script (required)
# e.g. docker.io/my_user
# For iguazio datanode registry use <data-node-ip>:8009
DOCKER_REGISTRY:

# Docker repository to push to (optional), added as a suffix to the registry
DOCKER_REPO:

# Optional - Use when your registry is connected to a DNS which is accessible from the cluster
# For iguazio datanode registry use:
# datanode-registry.iguazio-platform.app.<system-name>.<lab.iguazeng/cloud-cd>.com:80
OVERWRITE_IMAGE_REGISTRY:

# Optional - will attempt docker login if defined, need to login manually otherwise
REGISTRY_USERNAME:

# Optional - will attempt docker login if defined
REGISTRY_PASSWORD:


# Optional - only required if asking to reset DB
DB_USER:

# Optional - relevant when working with multiple DATA_NODES and iguazio datanode registry
# set to "true" if you want the image to be pushed only to a single registry specified in DOCKER_REGISTRY
SKIP_MULTI_NODE_PUSH:

# Optional - if no given the "default-tenant" namespace will be used
NAMESPACE:
