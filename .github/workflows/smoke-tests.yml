name: Smoke Tests

# Stub — real implementation lives on feature/smoke.
# This file exists on development so the workflow is dispatchable.
# Trigger with --ref feature/smoke to run the full implementation.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target for labeling (and optionally to build from)'
        required: false
        default: ''
      build_from_pr:
        description: 'Build Docker images and run tests from the PR branch (vs upstream). Requires pr_number.'
        required: false
        default: false
        type: boolean
      clean_resources_in_teardown:
        description: 'Clean test resources upon teardown'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_enabled:
        description: 'Allow SSH debugging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  stub:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This is a stub - NOP."
