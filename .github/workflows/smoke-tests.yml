name: Smoke Tests

permissions:
  contents: read
  pull-requests: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to target for labeling (and optionally to build from)'
        required: false
        default: ''
      clean_resources_in_teardown:
        description: 'Clean test resources upon teardown'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_enabled:
        description: 'Allow SSH debugging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  run-smoke-tests:
    name: Run Smoke Tests
    uses: ./.github/workflows/system-tests-opensource.yml
    with:
      pr_number: ${{ inputs.pr_number }}
      pytest_markers: 'not enterprise and smoke'
      clean_resources_in_teardown: ${{ inputs.clean_resources_in_teardown }}
      debug_enabled: ${{ inputs.debug_enabled }}
    secrets: inherit

  post-results:
    name: Post smoke test results
    runs-on: ubuntu-latest
    if: always() && inputs.pr_number != ''
    needs: run-smoke-tests
    permissions:
      pull-requests: write
    steps:
      - name: Determine label and outcome
        id: outcome
        run: |
          OUTCOME="${{ needs.run-smoke-tests.result }}"

          if [ "$OUTCOME" = "success" ]; then
            STATUS="Pass"
            EMOJI="✅"
            COLOR="0e8a16"
          else
            STATUS="Fail"
            EMOJI="❌"
            COLOR="d93f0b"
          fi

          LABEL="Smoke tests: ${STATUS}"
          SOURCE="PR branch"

          echo "label=${LABEL}"   >> $GITHUB_OUTPUT
          echo "color=${COLOR}"   >> $GITHUB_OUTPUT
          echo "emoji=${EMOJI}"   >> $GITHUB_OUTPUT
          echo "status=${STATUS}" >> $GITHUB_OUTPUT
          echo "source=${SOURCE}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6
        with:
          sparse-checkout: automation/scripts

      - name: Set label on PR
        uses: actions/github-script@v9
        with:
          script: |
            const addRemoveLabels = require('./automation/scripts/add-remove-labels.js')
            await addRemoveLabels({
              github, context,
              prNumber: ${{ inputs.pr_number }},
              labelsToAdd: [{ name: '${{ steps.outcome.outputs.label }}', color: '${{ steps.outcome.outputs.color }}' }],
              labelsToRemove: ['Smoke tests: Pass', 'Smoke tests: Fail', 'Smoke tests: Unknown']
            })

      - name: Build comment body
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BASE_REF="${{ needs.run-smoke-tests.outputs.pr_base_ref }}"
          BASE_SHA="${{ needs.run-smoke-tests.outputs.pr_base_sha }}"
          BASE_COMMITS_SINCE_SYNC="${{ needs.run-smoke-tests.outputs.base_commits_since_sync }}"

          BRANCH_URL="${{ github.server_url }}/${{ github.repository }}/commits/${BASE_REF}"
          if [ "${BASE_COMMITS_SINCE_SYNC}" = "0" ] || [ -z "${BASE_COMMITS_SINCE_SYNC}" ]; then
            SYNC_TEXT="synced to"
          else
            SYNC_TEXT="merged with ${BASE_COMMITS_SINCE_SYNC} new commits from"
          fi
          echo "Smoke Tests [${{ steps.outcome.outputs.status }}](${RUN_URL}) ${{ steps.outcome.outputs.emoji }} with the PR ${SYNC_TEXT} [\`${BASE_REF}\`](${BRANCH_URL}) HEAD \`${BASE_SHA:0:8}\`" > comment.md

      - name: Post comment to PR
        uses: thollander/actions-comment-pull-request@24bffb9b452ba05a4f3f77933840a6a841d1b32b
        with:
          pr-number: ${{ inputs.pr_number }}
          file-path: comment.md
          comment-tag: smoke_test_result
          mode: recreate
